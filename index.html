									<a
										role="button"
										class="navbar-burger"
										aria-label="menu"

										<span aria-hidden="true"></span>
										<span aria-hidden="true"></span>
										<span aria-hidden="true"></span>
									</a>
								</div>

								<div
									id="navbarBasicExample"
									class="navbar-menu is-shadowless px-5"
									style="background-color: transparent"
								>
									<div class="navbar-end">
										<div class="navbar-item is-flex is-justify-content-end">
											<div class="buttons">
												<a
													class="button is-info is-rounded"
													href="https://discord.com/invite/bQTPTc5Qrt"
													target="_blank"
												>
													<span class="icon">
														<img
															src="src/assets/discord-brands-solid-full.svg"
															alt="Discord"
														/>
													</span>
													<strong>Discord</strong>
												</a>
											</div>
										</div>
									</div>
								</div>
							</div>
						</nav>
					</div>
					<div class="column is-one-fifth button is-danger is-hidden-mobile">Third column is-one-fifth</div>
				</div>

		<div class="columns is-centered">
			<div class="column is-one-fifth button is-danger is-hidden-mobile">First column is-one-fifth</div>
			<div class="column is-three-fifths button is-info">
				<main class="has-text-centered">
					<h1>Second column is-three-fifths</h1>

					<div class="box" style="max-width: 400px; margin: 2rem auto">
						<h1 class="title is-4">Contact us</h1>

						<form action="https://formspree.io/f/mbdplgvl" method="POST">
							<div class="field">
								<label class="label">Email</label>
								<div class="control">
									<input class="input" type="email" name="email" placeholder="example@gmail.com" />
								</div>
							</div>

							<div class="field">
								<label class="label">Message</label>
								<div class="control">
									<textarea class="textarea" name="message" placeholder="Your message"></textarea>
								</div>
							</div>

							<div class="field">
								<div class="control">
									<button class="button is-dark is-fullwidth" type="submit">Submit</button>
								</div>
							</div>
						</form>
					</div>
				</main>
			</div>
			<div class="column is-one-fifth button is-danger is-hidden-mobile">Third column is-one-fifth</div>
